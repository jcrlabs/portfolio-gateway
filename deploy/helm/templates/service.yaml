apiVersion: v1
kind: Service
metadata:
  name: {{ include "portfolio-gateway.fullname" . }}
  labels:
    {{- include "portfolio-gateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
  selector:
    {{- include "portfolio-gateway.selectorLabels" . | nindent 4 }}
