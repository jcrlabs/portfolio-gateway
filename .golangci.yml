run:
  timeout: 5m

linters:
  enable-all: false
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - whitespace

linters-settings:
  goimports:
    local-prefixes: github.com/jonathanCaamano/portfolio-gateway

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Allow log/slog structured args (key, value pairs) without strict typing
    - linters: [staticcheck]
      text: "SA1006"
